<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de CV</title>

    <!-- Estilos de la aplicación -->
    <link rel="stylesheet" href="styles.css">

</head>
<body>

    <!-- Contenedor principal de la aplicación -->
    <div class="app-container" id="app">

        <!-- Encabezado fijo con título y badges de pasos -->
        <div class="step-header">
            <div class="step-title">📄 Generador Inteligente de CV</div>
            <!-- Los badges se generan dinámicamente desde script.js (updateIndicator) -->
            <div class="step-indicator" id="stepIndicator"></div>
        </div>

        <!-- Zona de contenido: cada paso inyecta su HTML aquí -->
        <div class="step-content" id="stepContent"></div>

    </div>

    <!--
        Configuración de plantillas disponibles.
        Este script define window.cvTemplatesList con el listado
        de plantillas (id, nombre, icono) que el usuario puede elegir.
        Debe cargarse ANTES que script.js.
    -->
    <script src="templates/config.js"></script>

    <!-- Lógica principal de la aplicación -->
    <script src="script.js"></script>

</body>
</html>
